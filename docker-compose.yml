version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: cricket-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3  

  backend:
    build:
      context: ./apps/backend
    container_name: cricket-backend
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    # env_file:
    #   - .env.production
    depends_on:
      - redis
    restart: unless-stopped  
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./apps/frontend
      args:
        VITE_API_BASE_URL: http://localhost:3000
    container_name: cricket-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend        
    
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1"]
      interval: 30s
      timeout: 5s
      retries: 3  
      start_period: 20s
